services:
  postgres:
    image: postgres:16-alpine
    container_name: public-safety-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5440}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-public_safety}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schemas/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-public_safety}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
